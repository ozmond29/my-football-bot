name: Run Football Prediction Bot Daily

on:
  schedule:
    # ⏱️ Triggers at 06:00 UTC every single day (7:00 AM Nigerian Time)
    - cron: '0 6 * * *'
  workflow_dispatch: # Keeps your manual "Run Now" testing button active

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Network Plugins
        run: pip install requests urllib3

      - name: Execute Model Mathematics
        run: python bot.py
        
